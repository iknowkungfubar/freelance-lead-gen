<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="100%" style="stop-color:#34d399" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="16" fill="url(#bg)" />

  <!-- Glow effect -->
  <rect x="40" y="40" width="720" height="200" rx="12" fill="url(#glow)" />

  <!-- Pipeline nodes -->
  <circle cx="120" cy="140" r="28" fill="none" stroke="url(#accent1)" stroke-width="2.5" />
  <circle cx="120" cy="140" r="8" fill="url(#accent1)" />
  <text x="120" y="120" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">DISCOVER</text>

  <line x1="148" y1="140" x2="212" y2="140" stroke="#475569" stroke-width="2" stroke-dasharray="6,4" />

  <circle cx="260" cy="140" r="28" fill="none" stroke="url(#accent2)" stroke-width="2.5" />
  <circle cx="260" cy="140" r="8" fill="url(#accent2)" />
  <text x="260" y="120" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">QUALIFY</text>

  <line x1="288" y1="140" x2="352" y2="140" stroke="#475569" stroke-width="2" stroke-dasharray="6,4" />

  <circle cx="400" cy="140" r="28" fill="none" stroke="#f59e0b" stroke-width="2.5" />
  <circle cx="400" cy="140" r="8" fill="#f59e0b" />
  <text x="400" y="120" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">DRAFT</text>

  <line x1="428" y1="140" x2="492" y2="140" stroke="#475569" stroke-width="2" stroke-dasharray="6,4" />

  <circle cx="540" cy="140" r="28" fill="none" stroke="#ef4444" stroke-width="2.5" />
  <circle cx="540" cy="140" r="8" fill="#ef4444" />
  <text x="540" y="120" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">VERIFY</text>

  <line x1="568" y1="140" x2="632" y2="140" stroke="#475569" stroke-width="2" stroke-dasharray="6,4" />

  <!-- Human icon for HITL gate -->
  <circle cx="680" cy="140" r="28" fill="none" stroke="#3b82f6" stroke-width="2.5" />
  <circle cx="680" cy="132" r="6" fill="#3b82f6" />
  <ellipse cx="680" cy="150" rx="10" ry="7" fill="#3b82f6" />
  <text x="680" y="118" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">HITL</text>

  <!-- Title -->
  <text x="400" y="54" text-anchor="middle" fill="#f1f5f9" font-size="22" font-family="sans-serif" font-weight="bold" letter-spacing="2">FREELANCE LEAD GEN</text>
  <text x="400" y="78" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif" letter-spacing="4">Agentic Opportunity Discovery · Qualification · Outreach</text>

  <!-- Stats bar at bottom -->
  <rect x="80" y="210" width="640" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <circle cx="110" cy="228" r="4" fill="#22c55e" />
  <text x="122" y="232" fill="#94a3b8" font-size="11" font-family="monospace">237 tests</text>
  <circle cx="250" cy="228" r="4" fill="#22c55e" />
  <text x="262" y="232" fill="#94a3b8" font-size="11" font-family="monospace">ruff clean</text>
  <circle cx="400" cy="228" r="4" fill="#22c55e" />
  <text x="412" y="232" fill="#94a3b8" font-size="11" font-family="monospace">Docker ready</text>
  <circle cx="560" cy="228" r="4" fill="#22c55e" />
  <text x="572" y="232" fill="#94a3b8" font-size="11" font-family="monospace">50% coverage</text>

  <!-- Decorative grid dots -->
  <circle cx="50" cy="50" r="1" fill="#334155" />
  <circle cx="750" cy="50" r="1" fill="#334155" />
  <circle cx="50" cy="230" r="1" fill="#334155" />
  <circle cx="750" cy="230" r="1" fill="#334155" />
  <circle cx="50" cy="140" r="1" fill="#334155" />
  <circle cx="750" cy="140" r="1" fill="#334155" />
</svg>
