    "D415",
    "ANN101",
    "ANN102",
    "ANN201",
    "ANN202",
    "ANN204",
    "ANN401",
    "COM812",
    "ISC001",
    "S311",
    "T201",
    "UP007",
    "EM101",
    "EM102",
    "TRY003",
    "TRY301",
    "PLR2004",
    "PLR0911",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PLR5501",
    "PLW1510",
    "SLF001",
    "ERA001",
    "TD002",
    "TD003",
    "FBT001",
    "FBT002",
    "C408",
    "N812",
    "N999",
    "S101",
    "RET504",
    "BLE001",
    "S110",
    "S112",
    "S608",
    "S105",
    "C901",
    "E501",
    "PLC0415",
    "TRY300",
    "ARG001",
    "ARG002",
    "F821",
    "G201",
    "PERF401",
