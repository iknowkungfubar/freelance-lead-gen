    "N818",
    "SIM105",
    "TC001",
    "TRY004",
    "RUF006",
    "RUF100",
    "PYI063",
    "PT013",
    "SIM117",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "S101",
    "ANN",
    "D",
    "PLR",
    "SLF",
    "S",
    "N",
    "T201",
    "BLE001",
    "S110",
    "ARG001",
    "ARG002",
    "F821",
]
"alembic/**" = [
    "ANN",
    "D",
    "E501",
]
"conftest.py" = [
    "ANN",
    "D",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "network: marks tests as needing network access (deselect with '-m \"not network\"')",
    "hitl: marks tests for human-in-the-loop interface",
    "integration: marks integration tests",
    "smoke: marks smoke tests",
]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
warn_unreachable = true
exclude = [
    ".venv/",
    "venv/",
    "build/",
    "tests/",
    "alembic/",
]

[tool.coverage.run]
source = [
    "freelance_lead_gen",
]
omit = [
    "tests/*",
    "alembic/*",
    "**/__init__.py",
]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
fail_under = 20

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=6.1.1",
    "mypy>=1.15.0",
    "pip-audit>=2.9.0",
]
