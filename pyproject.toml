[project]
name = "freelance-lead-gen"
version = "0.1.0"
description = "Agentic freelance lead generation system — automates discovery, qualification, and outreach preparation for technical freelance opportunities"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "Josh Turin", email = "josh@turin.tech" },
]
keywords = [
    "freelance",
    "lead-generation",
    "agentic",
    "browser-automation",
    "ai",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Scheduling",
]
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "structlog>=24.0",
    "click>=8.0",
    "rich>=13.0",
    "httpx>=0.27",
    "pyyaml>=6.0",
    "playwright>=1.40",
    "browser-use>=0.1.0",
    "playwright-stealth>=1.0",
    "openai>=1.0",
    "langchain>=0.3",
    "langchain-community>=0.3",
    "langchain-openai>=1.1.14",
    "sqlalchemy>=2.0",
    "aiosqlite>=0.20",
    "textual>=0.52",
    "textual-plotext>=1.0",
    "apscheduler>=3.11.0",
    "python-dotenv>=1.0",
    "tiktoken>=0.7",
    "aiosqlite>=0.22.1",
    "pypdf>=5.6.0",
    "aiohttp>=3.11.0",
]

[project.license]
text = "MIT"

[project.urls]
homepage = "https://github.com/iknowkungfubar/freelance-lead-gen"
repository = "https://github.com/iknowkungfubar/freelance-lead-gen"
documentation = "https://github.com/iknowkungfubar/freelance-lead-gen/docs"

[project.scripts]
freelance-lead-gen = "freelance_lead_gen.cli:main"

[build-system]
requires = [
    "hatchling>=1.21",
]
build-backend = "hatchling.build"

[tool.hatch.build]
exclude = [
    "tests/",
    ".github/",
    "docs/",
    "browser_data/",
    "*.sqlite",
    "*.db",
    ".env*",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "ALL",
]
ignore = [
